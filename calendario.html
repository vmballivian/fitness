<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Calendario de Entrenos</title>
<style>
  :root{
    --navy:#2d3a82;--navy-dark:#1f2960;--bg:#f5f6fa;--card:#fff;
    --text:#1a1d2e;--muted:#6b7088;--fire:#e53935;--green:#2e7d32;--rest:#9aa1b8;--accent:#ff9800;
    --head1:#2d3a82;--head2:#1f2960;
  }
  body.fio{--head1:#8e4baf;--head2:#5d2e75}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--text);margin:0;padding:0;line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom)}
  header{background:linear-gradient(135deg,var(--head1),var(--head2));
    color:white;padding:24px 20px 18px;text-align:center}
  header h1{margin:0;font-size:1.5rem;letter-spacing:-.5px}
  header .who{font-size:.85rem;opacity:.85;margin-top:2px}
  .back{display:inline-block;margin-top:8px;color:#e5ecff;text-decoration:none;font-size:.82rem}
  .nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
  .nav a{background:rgba(255,255,255,.16);color:#fff;text-decoration:none;font-size:.78rem;
    font-weight:600;padding:6px 12px;border-radius:16px}
  main{max-width:520px;margin:0 auto;padding:16px 16px 60px}

  .warn{background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:12px 16px;
    font-size:.82rem;color:#7a5a00;margin-bottom:16px}
  .warn b{color:#9c4a00}
  .warn details{margin-top:6px}
  .warn summary{cursor:pointer;font-weight:700;color:#9c4a00}

  .stats{display:flex;gap:12px;margin-bottom:16px}
  .stat{flex:1;background:var(--card);border-radius:12px;padding:14px;text-align:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .stat .big{font-size:1.8rem;font-weight:800;color:var(--head1);line-height:1}
  .stat .lbl{font-size:.72rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}

  .calwrap{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .calnav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .calnav button{background:#eef0f7;border:none;color:var(--head1);font-size:1.3rem;font-weight:700;
    width:40px;height:40px;border-radius:10px;cursor:pointer}
  .calnav button:active{background:#dde2f0}
  .calnav .month{font-size:1.05rem;font-weight:700;text-transform:capitalize}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .dow span{text-align:center;font-size:.7rem;color:var(--muted);font-weight:700;padding:4px 0}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;
    background:#eef0f5;color:var(--text);position:relative;user-select:none}
  .cell.empty{background:transparent;cursor:default}
  .cell.today{outline:2px solid var(--head1);font-weight:800}
  .cell.done{background:var(--green);color:#fff;font-weight:700}
  .cell.miss{background:var(--fire);color:#fff}
  .cell.restday{background:#e4e7ef;color:var(--muted)}
  .cell .mk{font-size:.72rem;line-height:1;margin-top:1px}

  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;z-index:10}
  .sheet-bg.show{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;z-index:11;
    border-radius:18px 18px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));
    transform:translateY(100%);transition:transform .22s ease;max-width:520px;margin:0 auto;
    max-height:88vh;overflow-y:auto}
  .sheet.show{transform:translateY(0)}
  .sheet .ttl{margin:0 0 1px;font-size:.78rem;color:var(--muted);text-transform:capitalize}
  .sheet h2{margin:0 0 12px;font-size:1.2rem;color:var(--head1)}
  .badge{display:inline-block;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;
    color:#fff;margin-left:8px;vertical-align:middle}
  .badge.done{background:var(--green)}
  .badge.miss{background:var(--fire)}
  .ex{display:flex;justify-content:space-between;align-items:center;
    padding:9px 0;border-bottom:1px solid #eef0f5;gap:10px}
  .ex:last-child{border-bottom:none}
  .ex-name{font-weight:600;font-size:.92rem;margin:0}
  .ex-name small{display:block;color:var(--muted);font-weight:400;font-style:italic;font-size:.74rem}
  .reps{background:#eef0f7;color:var(--head1);font-weight:700;padding:3px 9px;border-radius:8px;
    font-size:.76rem;white-space:nowrap}
  .vid{display:inline-flex;align-items:center;background:var(--accent);color:white;text-decoration:none;
    font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px}
  .altblock{margin-top:14px;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:10px 14px}
  .altblock .alth{font-size:.82rem;font-weight:700;color:var(--green);margin:0 0 4px}
  .altblock .ex{border-bottom-color:#cce8cf}
  .restmsg{text-align:center;color:var(--muted);padding:18px 0}
  .restmsg .ic{font-size:2.4rem}
  textarea{width:100%;border:1.5px solid #d8dce8;border-radius:10px;padding:10px;
    font-size:.9rem;font-family:inherit;resize:vertical;min-height:54px;margin:14px 0}
  .actions{display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:10px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer}
  .btn.done{background:var(--green);color:#fff}
  .btn.undo{background:#eef0f7;color:var(--muted)}
  .btn.note{background:var(--head1);color:#fff}
  .btn:active{opacity:.85}
  .legend{margin-top:16px;font-size:.78rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:14px;justify-content:center}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:13px;height:13px;border-radius:3px;display:inline-block}
  .hint{margin-top:12px;text-align:center;font-size:.78rem;color:var(--muted)}
</style>
</head>
<body>

<header>
  <h1>📆 Calendario de Entrenos</h1>
  <div class="who" id="who"></div>
  <a class="back" href="index.html">← cambiar usuario</a>
  <div class="nav" id="nav"></div>
</header>

<main>
  <div id="warnSlot"></div>

  <div class="stats">
    <div class="stat"><div class="big" id="statMonth">0</div><div class="lbl">este mes</div></div>
    <div class="stat"><div class="big" id="statStreak">0</div><div class="lbl">racha</div></div>
    <div class="stat"><div class="big" id="statTotal">0</div><div class="lbl">total</div></div>
  </div>

  <div class="calwrap">
    <div class="calnav">
      <button id="prev">‹</button>
      <div class="month" id="monthLabel"></div>
      <button id="next">›</button>
    </div>
    <div class="dow"><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span><span>D</span></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="legend">
    <span><i style="background:#2e7d32"></i>hecho</span>
    <span><i style="background:#e53935"></i>no lo hiciste</span>
    <span><i style="background:#e4e7ef"></i>descanso</span>
    <span><i style="background:#eef0f5;border:1px solid #ccd"></i>pendiente</span>
  </div>
  <p class="hint">Toca un día para ver su entreno y marcarlo. Se guarda en este teléfono.</p>
</main>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <p class="ttl" id="sheetDate">día</p>
  <h2 id="sheetTitle"><span id="sheetTitleText">Entreno</span> <span id="sheetBadge"></span></h2>
  <div id="sheetBody"></div>
  <textarea id="note" placeholder="Notas: reps, cómo te sentiste..."></textarea>
  <div class="actions" id="actions"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>document.write('<scr'+'ipt src="sync-config.js?v='+Date.now()+'"><\/scr'+'ipt>');</script>
<script>document.write('<scr'+'ipt src="week-data.js?v='+Date.now()+'"><\/scr'+'ipt>');</script>
<script>
  // ===== Usuario =====
  const params = new URLSearchParams(location.search);
  const user = params.get('user')==='fio' ? 'fio' : 'vic';
  if(user==='fio') document.body.classList.add('fio');

  // Plantillas semanales en week-data.js (fuente única, 0=domingo ... 6=sábado)
  const WEEK = user==='fio' ? WEEK_FIO : WEEK_VIC;
  const STORE = user==='fio' ? 'fitlog_fio_v2' : 'fitlog_v3';

  // ===== Cabecera por usuario =====
  document.getElementById('who').textContent = user==='fio' ? '🤰 Fio · plan prenatal (2º trimestre)' : '🏋️ Vic · alta intensidad';
  const nav = document.getElementById('nav');
  if(user==='fio'){
    nav.innerHTML = '<a href="semana-fio.html">📅 Mi semana</a>';
    document.getElementById('warnSlot').innerHTML =
      '<div class="warn"><b>Embarazo · 2º trimestre.</b> Intensidad moderada, nunca al fallo. Si puedes conversar mientras te mueves, vas bien. Nada de saltos, nada boca arriba en el suelo, no aguantes la respiración.'+
      '<details><summary>Para de inmediato y llama a tu matrona si…</summary>'+
      'mareo o desmayo, sangrado o pérdida de líquido, contracciones, dolor de pecho, dolor de cabeza fuerte, dolor o hinchazón en una pierna, o si sientes menos movimiento del bebé. '+
      'Esta es una guía general: confírmala con tu médico o matrona.</details></div>';
  } else {
    nav.innerHTML = '<a href="semana-intermedio.html">📅 Semana</a><a href="ejercicios-catalogo.html">📚 Catálogo</a><a href="sustitutos-coach.html">🏋️ Sustitutos</a>';
  }

  // ===== Estado =====
  const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const DOWN = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const load = () => { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch(e){ return {}; } };
  const save = d => localStorage.setItem(STORE, JSON.stringify(d));
  let data = load();

  // ===== Sync en la nube (Supabase) =====
  // Cada marca lleva un sello de tiempo (ts). Al juntar dos aparatos, gana la marca más nueva.
  // Sin internet o sin config, la app sigue 100% funcional con el guardado local.
  const stamp = o => { o.ts = Date.now(); return o; };
  function mergeData(a, b){
    const out = {};
    for(const k of new Set([...Object.keys(a||{}), ...Object.keys(b||{})])){
      const ea = a && a[k], eb = b && b[k];
      out[k] = (ea && eb) ? (((ea.ts||0) >= (eb.ts||0)) ? ea : eb) : (ea || eb);
    }
    return out;
  }
  const SB = (window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase)
    ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;

  async function pullRemote(){
    if(!SB) return;
    try{
      const { data:row, error } = await SB.from('fitlog').select('data').eq('user_id', user).maybeSingle();
      if(error) return;
      if(row && row.data){ data = mergeData(data, row.data); save(data); render(); }
    }catch(e){}
  }
  async function pushRemote(){
    if(!SB) return;
    try{
      const { data:row } = await SB.from('fitlog').select('data').eq('user_id', user).maybeSingle();
      const merged = mergeData((row && row.data) || {}, data);
      data = merged; save(data);
      await SB.from('fitlog').upsert({ user_id:user, data:merged, updated_at:new Date().toISOString() });
    }catch(e){}
  }

  const now = new Date(); now.setHours(0,0,0,0);
  const todayKey = ymd(now);
  let viewY = now.getFullYear(), viewM = now.getMonth();
  let selKey = null;

  function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function dowOf(key){ const [y,m,d]=key.split('-').map(Number); return new Date(y,m-1,d).getDay(); }

  function render(){
    document.getElementById('monthLabel').textContent = MONTHS[viewM]+' '+viewY;
    const grid = document.getElementById('grid'); grid.innerHTML = '';
    const first = new Date(viewY, viewM, 1);
    let lead = (first.getDay()+6)%7;
    const daysInMonth = new Date(viewY, viewM+1, 0).getDate();
    for(let i=0;i<lead;i++){ const c=document.createElement('div'); c.className='cell empty'; grid.appendChild(c); }
    for(let day=1; day<=daysInMonth; day++){
      const key = viewY+'-'+String(viewM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      const plan = WEEK[dowOf(key)];
      const entry = data[key];
      const c = document.createElement('div'); c.className='cell';
      let mark='';
      if(entry && entry.done){ c.classList.add('done'); mark='✓'; }
      else if(plan.rest){ c.classList.add('restday'); mark='·'; }
      else if(key < todayKey){ c.classList.add('miss'); mark='✕'; }
      if(key===todayKey) c.classList.add('today');
      const num=document.createElement('div'); num.textContent=day; c.appendChild(num);
      if(mark){ const m=document.createElement('div'); m.className='mk'; m.textContent=mark; c.appendChild(m); }
      c.onclick=()=>openSheet(key);
      grid.appendChild(c);
    }
    updateStats();
  }

  function updateStats(){
    const keys = Object.keys(data).filter(k=>data[k].done);
    document.getElementById('statTotal').textContent = keys.length;
    const mpref = viewY+'-'+String(viewM+1).padStart(2,'0');
    document.getElementById('statMonth').textContent = keys.filter(k=>k.startsWith(mpref)).length;
    let streak=0; let d=new Date(now);
    const isDone = dd => data[ymd(dd)] && data[ymd(dd)].done;
    const isRest = dd => WEEK[dd.getDay()].rest;
    if(!isDone(d) && !isRest(d)) d.setDate(d.getDate()-1);
    while(true){
      if(isDone(d)){ streak++; d.setDate(d.getDate()-1); }
      else if(isRest(d)){ d.setDate(d.getDate()-1); }
      else break;
    }
    document.getElementById('statStreak').textContent = streak;
  }

  function openSheet(key){
    selKey = key;
    const plan = WEEK[dowOf(key)];
    const entry = data[key] || {};
    const [y,m,dd]=key.split('-').map(Number);
    document.getElementById('sheetDate').textContent = DOWN[dowOf(key)]+' '+dd+' '+MONTHS[m-1];
    document.getElementById('sheetTitleText').textContent = plan.title;
    const badge = document.getElementById('sheetBadge'); badge.className=''; badge.textContent='';
    if(entry.done){ badge.className='badge done'; badge.textContent='✓ hecho'; }
    else if(!plan.rest && key<todayKey){ badge.className='badge miss'; badge.textContent='no lo hiciste'; }

    const body=document.getElementById('sheetBody');
    if(plan.rest){
      body.innerHTML='<div class="restmsg"><div class="ic">🧘</div><p>Día de descanso. Movilidad, caminata, hidrátate.</p></div>';
    } else {
      const rowsOf = list => list.map(e=>{
        const reps = e.r ? '<span class="reps">'+e.r+'</span>' : '';
        const vid = e.v ? '<a class="vid" target="_blank" href="https://www.youtube.com/results?search_query='+e.v+'+exercise+form">▶</a>' : '';
        const sub = e.s ? '<small>'+e.s+'</small>' : '';
        return '<div class="ex"><p class="ex-name">'+e.n+sub+vid+'</p>'+reps+'</div>';
      }).join('');
      let html = rowsOf(plan.ex);
      if(plan.alt){ html += '<div class="altblock"><p class="alth">🏃 Si no hay fútbol, haz este circuito</p>'+rowsOf(plan.alt)+'</div>'; }
      body.innerHTML = html;
    }

    document.getElementById('note').value = entry.note || '';
    const act=document.getElementById('actions'); act.innerHTML='';
    const commit=(entry)=>{ data[key]=stamp(entry); save(data); pushRemote(); close(); render(); };
    if(plan.rest){
      const b=document.createElement('button'); b.className='btn note'; b.textContent='Guardar nota';
      b.onclick=()=>commit({done:false, note:noteVal()});
      act.appendChild(b);
    } else if(entry.done){
      const b1=document.createElement('button'); b1.className='btn note'; b1.textContent='Guardar nota';
      b1.onclick=()=>commit({done:true, note:noteVal()});
      const b2=document.createElement('button'); b2.className='btn undo'; b2.textContent='Desmarcar';
      b2.onclick=()=>commit({done:false, note:noteVal()});
      act.appendChild(b1); act.appendChild(b2);
    } else {
      const b=document.createElement('button'); b.className='btn done'; b.textContent='✓ Marcar hecho';
      b.onclick=()=>commit({done:true, note:noteVal()});
      act.appendChild(b);
    }

    document.getElementById('sheetBg').classList.add('show');
    document.getElementById('sheet').classList.add('show');
  }
  const noteVal=()=>document.getElementById('note').value.trim();
  function close(){
    document.getElementById('sheetBg').classList.remove('show');
    document.getElementById('sheet').classList.remove('show');
  }

  document.getElementById('sheetBg').onclick=close;
  document.getElementById('prev').onclick=()=>{ viewM--; if(viewM<0){viewM=11;viewY--;} render(); };
  document.getElementById('next').onclick=()=>{ viewM++; if(viewM>11){viewM=0;viewY++;} render(); };

  render();
  pullRemote();
</script>

</body>
</html>
