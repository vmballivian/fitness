<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Volumen semanal</title>
<style>
  :root{
    --navy:#2d3a82;--navy-dark:#1f2960;--bg:#f5f6fa;--card:#fff;
    --text:#1a1d2e;--muted:#6b7088;--fire:#e53935;--green:#2e7d32;--accent:#ff9800;
    --head1:#2d3a82;--head2:#1f2960;
  }
  body.fio{--head1:#8e4baf;--head2:#5d2e75}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--text);margin:0;padding:0;line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom)}
  header{background:linear-gradient(135deg,var(--head1),var(--head2));
    color:white;padding:24px 20px 18px;text-align:center}
  header h1{margin:0;font-size:1.5rem;letter-spacing:-.5px}
  header .who{font-size:.85rem;opacity:.85;margin-top:2px}
  .back{display:inline-block;margin-top:8px;color:#e5ecff;text-decoration:none;font-size:.82rem}
  main{max-width:520px;margin:0 auto;padding:16px 16px 60px}

  .hint{background:#fff8e1;border:1px solid #ffe082;border-radius:12px;padding:12px 16px;
    font-size:.8rem;color:#7a5a00;margin-bottom:16px}
  .hint code{background:#fff;border-radius:4px;padding:1px 5px;font-size:.78rem}

  .wk{background:var(--card);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px}
  .wk .head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px}
  .wk h2{margin:0;font-size:1.02rem;color:var(--head1)}
  .wk .range{font-size:.74rem;color:var(--muted)}
  .wk .tot{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .wk .tot .big{font-size:1.7rem;font-weight:800;color:var(--head1);line-height:1}
  .wk .tot .lbl{font-size:.74rem;color:var(--muted)}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:8px 0;border-bottom:1px solid #eef0f5}
  .row:last-of-type{border-bottom:none}
  .row .nm{font-size:.9rem;font-weight:600;text-transform:capitalize}
  .row .qs{display:flex;align-items:center;gap:8px;white-space:nowrap}
  .row .q{background:#eef0f7;color:var(--head1);font-weight:700;padding:3px 10px;border-radius:8px;font-size:.82rem}
  .delta{font-size:.76rem;font-weight:700;min-width:52px;text-align:right}
  .delta.up{color:var(--green)}
  .delta.dn{color:var(--fire)}
  .delta.eq,.delta.nw{color:var(--muted);font-weight:600}
  details{margin-top:10px}
  summary{cursor:pointer;font-size:.78rem;color:var(--muted);font-weight:600}
  .day{font-size:.78rem;color:var(--muted);padding:4px 0 0 4px}
  .day b{color:var(--text);font-weight:600;text-transform:capitalize}
  .empty{text-align:center;color:var(--muted);padding:40px 10px}
  .empty .ic{font-size:2.6rem}
</style>
</head>
<body>

<header>
  <h1>📈 Volumen semanal</h1>
  <div class="who" id="who"></div>
  <a class="back" id="backlink" href="calendario.html">← volver al calendario</a>
</header>

<main>
  <div class="hint">
    Se calcula solo desde tus notas del calendario. Anota cada ejercicio en su línea:
    <code>100 sentadillas</code> o por series <code>10-10-10-8 remos</code> (las sumo yo).
  </div>
  <div id="weeks"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>document.write('<scr'+'ipt src="sync-config.js?v='+Date.now()+'"><\/scr'+'ipt>');</script>
<script>
  // ===== Usuario (mismo esquema que calendario.html) =====
  const params = new URLSearchParams(location.search);
  const user = params.get('user')==='fio' ? 'fio' : 'vic';
  if(user==='fio') document.body.classList.add('fio');
  const STORE = user==='fio' ? 'fitlog_fio_v2' : 'fitlog_v3';
  document.getElementById('who').textContent = user==='fio' ? '🤰 Fio' : '🏋️ Vic';
  document.getElementById('backlink').href = 'calendario.html?user='+user;

  const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const DOWN = ['dom','lun','mar','mié','jue','vie','sáb'];
  const load = () => { try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch(e){ return {}; } };
  const save = d => localStorage.setItem(STORE, JSON.stringify(d));
  let data = load();

  function mergeData(a, b){
    const out = {};
    for(const k of new Set([...Object.keys(a||{}), ...Object.keys(b||{})])){
      const ea = a && a[k], eb = b && b[k];
      out[k] = (ea && eb) ? (((ea.ts||0) >= (eb.ts||0)) ? ea : eb) : (ea || eb);
    }
    return out;
  }
  const SB = (window.SUPABASE_URL && window.SUPABASE_ANON_KEY && window.supabase)
    ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY) : null;
  async function pullRemote(){
    if(!SB) return;
    try{
      const { data:row, error } = await SB.from('fitlog').select('data').eq('user_id', user).maybeSingle();
      if(error) return;
      if(row && row.data){ data = mergeData(data, row.data); save(data); render(); }
    }catch(e){}
  }

  function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function weekStart(key){
    const [y,m,d]=key.split('-').map(Number);
    const dt=new Date(y,m-1,d);
    dt.setDate(dt.getDate()-((dt.getDay()+6)%7)); // retrocede al lunes
    return ymd(dt);
  }
  function fmtDay(key){
    const [y,m,d]=key.split('-').map(Number);
    return DOWN[new Date(y,m-1,d).getDay()]+' '+d;
  }
  function fmtRange(mondayKey){
    const [y,m,d]=mondayKey.split('-').map(Number);
    const a=new Date(y,m-1,d), b=new Date(y,m-1,d+6);
    const fa=a.getDate()+' '+MONTHS[a.getMonth()], fb=b.getDate()+' '+MONTHS[b.getMonth()];
    return fa+' – '+fb;
  }

  // "100 sentadillas" → 100 · "10-10-10-8 remos" / "20+20+20 flexiones" → suma las series
  function parseNote(note){
    const items=[];
    for(const raw of String(note||'').split(/\n+/)){
      const m = raw.trim().match(/^(\d+(?:\s*[-+]\s*\d+)*)\s*[x×]?\s+(.+)$/);
      if(!m) continue;
      const nums = m[1].split(/[-+]/).map(s=>parseInt(s.trim(),10)).filter(n=>!isNaN(n));
      if(!nums.length) continue;
      const qty = nums.length>1 ? nums.reduce((a,b)=>a+b,0) : nums[0];
      items.push({qty, label:m[2].trim()});
    }
    return items;
  }
  // agrupa "Rows", "rows", "remos"≠, "kb swings"→"kb swing": minúsculas, sin acentos, sin la s final
  function norm(label){
    let s = label.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
    return s.replace(/s$/,'');
  }

  function render(){
    // weeks[monday] = { total, ex:{norm:{qty,label,days:[{day,qty}]}} }
    const weeks = {};
    for(const key of Object.keys(data)){
      if(!/^\d{4}-\d{2}-\d{2}$/.test(key)) continue;
      const items = parseNote(data[key].note);
      if(!items.length) continue;
      const wk = weekStart(key);
      weeks[wk] = weeks[wk] || {total:0, ex:{}};
      for(const it of items){
        const k = norm(it.label);
        const e = weeks[wk].ex[k] = weeks[wk].ex[k] || {qty:0, label:it.label, days:[]};
        e.qty += it.qty; e.label = it.label;
        e.days.push({day:key, qty:it.qty});
        weeks[wk].total += it.qty;
      }
    }

    const box = document.getElementById('weeks');
    const mondays = Object.keys(weeks).sort();
    if(!mondays.length){
      box.innerHTML = '<div class="empty"><div class="ic">📝</div><p>Aún no hay notas con volúmenes.<br>Anota tus totales en el calendario y aparecen aquí.</p></div>';
      return;
    }

    const delta = (cur, prev) => {
      if(prev==null) return '<span class="delta nw">nuevo</span>';
      const d = cur - prev;
      if(d>0) return '<span class="delta up">▲ +'+d+'</span>';
      if(d<0) return '<span class="delta dn">▼ '+d+'</span>';
      return '<span class="delta eq">= igual</span>';
    };

    let html = '';
    for(let i=mondays.length-1; i>=0; i--){
      const wk = weeks[mondays[i]];
      const prev = i>0 ? weeks[mondays[i-1]] : null;
      const rows = Object.keys(wk.ex).sort((a,b)=>wk.ex[b].qty-wk.ex[a].qty).map(k=>{
        const e = wk.ex[k];
        const pq = prev && prev.ex[k] ? prev.ex[k].qty : null;
        return '<div class="row"><span class="nm">'+e.label+'</span>'+
          '<span class="qs"><span class="q">'+e.qty+'</span>'+delta(e.qty, pq)+'</span></div>';
      }).join('');
      const dayLines = {};
      for(const k of Object.keys(wk.ex)) for(const d of wk.ex[k].days){
        dayLines[d.day] = dayLines[d.day] || [];
        dayLines[d.day].push(d.qty+' '+wk.ex[k].label);
      }
      const detail = Object.keys(dayLines).sort().map(d=>
        '<div class="day"><b>'+fmtDay(d)+':</b> '+dayLines[d].join(' · ')+'</div>').join('');
      html += '<div class="wk">'+
        '<div class="head"><h2>Semana del '+parseInt(mondays[i].split('-')[2],10)+' '+MONTHS[parseInt(mondays[i].split('-')[1],10)-1]+'</h2>'+
        '<span class="range">'+fmtRange(mondays[i])+'</span></div>'+
        '<div class="tot"><span class="big">'+wk.total+'</span><span class="lbl">reps totales '+
        (prev ? delta(wk.total, prev.total) : '')+'</span></div>'+
        rows+
        '<details><summary>ver por día</summary>'+detail+'</details>'+
        '</div>';
    }
    box.innerHTML = html;
  }

  render();
  pullRemote();
</script>

</body>
</html>
