<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi Semana — Fitness</title>
<style>
  :root{
    --navy:#2d3a82;--navy-dark:#1f2960;--bg:#f5f6fa;--card:#fff;
    --text:#1a1d2e;--muted:#6b7088;--accent:#ff9800;--fire:#e53935;
    --soccer:#2e7d32;--done:#9aa1b8;
  }
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--text);margin:0;padding:0;line-height:1.5}
  header{background:linear-gradient(135deg,var(--navy),var(--navy-dark));
    color:white;padding:30px 24px;text-align:center}
  header h1{margin:0;font-size:1.9rem;letter-spacing:-.5px}
  header p{margin:8px 0 0;opacity:.85;font-size:.95rem}
  .rule{max-width:760px;margin:20px auto 0;padding:14px 22px;background:#fff1f0;
    border:1px solid #ffcdd2;border-radius:10px;font-size:.9rem;color:#9c1f1a;font-weight:600}
  main{max-width:760px;margin:18px auto;padding:0 20px 48px}
  .day{background:var(--card);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);
    margin-bottom:14px;overflow:hidden}
  .day-head{background:var(--navy);color:white;padding:13px 20px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
  .day-head .num{font-size:.72rem;opacity:.7;letter-spacing:1px;text-transform:uppercase}
  .day-head h2{margin:2px 0 0;font-size:1.15rem}
  .pill{font-size:.65rem;padding:4px 11px;border-radius:20px;font-weight:700;
    text-transform:uppercase;color:white}
  .pill.soccer{background:var(--soccer)}
  .pill.done{background:var(--done)}
  .pill.go{background:var(--fire)}
  .day.soccer .day-head{background:var(--soccer)}
  .day.done .day-head{background:var(--done)}
  .day.rest .day-head{background:var(--done)}
  .day-body{padding:14px 20px}
  .ex{display:flex;justify-content:space-between;align-items:center;
    padding:9px 0;border-bottom:1px solid #eef0f5;gap:10px}
  .ex:last-child{border-bottom:none}
  .ex-name{font-weight:600;font-size:.95rem;margin:0}
  .ex-name small{display:block;color:var(--muted);font-weight:400;font-style:italic;font-size:.76rem}
  .reps{background:#ffe5e5;color:var(--fire);font-weight:700;padding:3px 10px;
    border-radius:8px;font-size:.8rem;white-space:nowrap}
  .gap{display:inline-block;background:#0277bd;color:#fff;font-size:.6rem;padding:2px 6px;
    border-radius:4px;font-weight:700;text-transform:uppercase;margin-left:6px}
  .note{padding:18px 20px;color:var(--muted);font-size:.9rem}
  .note strong{color:var(--soccer)}
  .vid{display:inline-flex;align-items:center;background:var(--accent);color:white;
    text-decoration:none;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
  .altblock{margin:12px 0 0;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:8px 16px}
  .altblock .alth{font-size:.82rem;font-weight:700;color:var(--soccer);margin:2px 0 2px}
  .altblock .ex{border-bottom-color:#cce8cf}
</style>
</head>
<body>

<header>
  <h1>Mi Semana</h1>
  <p>Full body al fallo · 20 min · fútbol lun + mié</p>
  <a href="calendario.html?user=vic" style="display:inline-block;margin-top:8px;color:#cfe0ff;text-decoration:none;font-size:.85rem">← volver al calendario</a>
</header>

<div class="rule" style="max-width:760px">
  Cada ejercicio al fallo (hasta no poder una rep más con forma). Rotas entre los 3 movimientos, descanso corto, vueltas que entren en 20 min. Marca tu día en el <a href="calendario.html">calendario</a>.
</div>

<main id="week"></main>

<script src="week-data.js"></script>
<script>
  const DOW = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const ORDER = [1,2,3,4,5,6,0];
  const exRow = e => {
    const sub = e.s ? '<small>'+e.s+'</small>' : '';
    const vid = e.v ? '<a class="vid" target="_blank" href="https://www.youtube.com/results?search_query='+e.v+'+exercise+form">▶</a>' : '';
    const reps = e.r ? '<span class="reps">'+e.r+'</span>' : '';
    return '<div class="ex"><p class="ex-name">'+e.n+' '+sub+vid+'</p>'+reps+'</div>';
  };
  document.getElementById('week').innerHTML = ORDER.map(d=>{
    const p = WEEK_VIC[d];
    const cls = p.rest ? ' rest' : (p.soccer ? ' soccer' : '');
    const pill = p.rest ? '' : (p.soccer
      ? '<span class="pill soccer">⚽ Cancha PM</span>'
      : '<span class="pill go">🔥 Hazlo</span>');
    let body;
    if(p.rest){
      body = '<div class="note">'+(p.note||'Descanso. Movilidad, caminata, hidrátate.')+'</div>';
    } else {
      let inner = p.ex.map(exRow).join('');
      if(p.alt){ inner += '<div class="altblock"><p class="alth">🏃 Si no hay fútbol, haz este circuito</p>'+p.alt.map(exRow).join('')+'</div>'; }
      body = '<div class="day-body">'+inner+'</div>';
    }
    return '<div class="day'+cls+'"><div class="day-head"><div><div class="num">'+DOW[d]+'</div><h2>'+p.title+'</h2></div>'+pill+'</div>'+body+'</div>';
  }).join('');
</script>

</body>
</html>
